<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#18186a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="C64 Manager">
<link rel="manifest" href="./manifest.json">
<title>C64 Disk Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

:root {
  --bg:       #080810;
  --c64bg:    #3535c0;
  --c64dark:  #18186a;
  --c64bord:  #4848c8;
  --c64txt:   #7070e8;
  --c64white: #d0d0ff;
  --c64cyan:  #18d8d8;
  --c64green: #18d818;
  --c64yel:   #d8d018;
  --c64red:   #d81818;
  --c64mag:   #c818c8;
  --c64inv:   #7070e8;
  --c64invfg: #3535c0;
  --scan:     rgba(0,0,14,.06);
  --font:     'Share Tech Mono', monospace;
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; overflow:hidden; }
body { background:var(--bg); display:flex; flex-direction:column; font-family:var(--font); }

/* TOP BAR */
#top {
  height:26px; background:var(--c64dark); border-bottom:2px solid var(--c64bord);
  display:flex; align-items:center; padding:0 12px; gap:10px; flex-shrink:0; z-index:10;
}
.logo { font-size:12px; letter-spacing:3px; color:var(--c64txt); text-transform:uppercase; }
.logo b { color:var(--c64yel); }
#ver { font-size:9px; color:var(--c64bord); letter-spacing:1px; }
#clk { font-size:11px; color:var(--c64txt); letter-spacing:2px; margin-left:auto; }

/* WORKSPACE */
#ws { flex:1; display:flex; overflow:hidden; min-height:0; }

/* PANEL BASE */
.panel {
  display:flex; flex-direction:column; overflow:hidden;
  background:var(--c64bg); position:relative; flex-shrink:0;
}
.panel::before {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:5;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,var(--scan) 3px,var(--scan) 4px);
}
.panel::after {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:4;
  background:radial-gradient(ellipse 90% 80% at 50% 44%,rgba(60,60,200,.04) 0%,rgba(0,0,18,.18) 100%);
}
.phdr {
  height:20px; background:var(--c64dark); border-bottom:1px solid var(--c64bord);
  display:flex; align-items:center; padding:0 8px; gap:8px; flex-shrink:0; z-index:6;
  font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--c64white);
}
.phdr-t { flex:1; }
.phdr-s { font-size:9px; color:var(--c64txt); }
.pfoot {
  height:20px; background:var(--c64dark); border-top:1px solid var(--c64bord);
  display:flex; align-items:center; padding:0 8px; gap:12px; flex-shrink:0; z-index:6;
  font-size:10px; color:var(--c64txt); letter-spacing:1px; text-transform:uppercase;
}
.pfoot b { color:var(--c64white); }

/* RESIZER */
.rz {
  width:5px; background:var(--c64dark); border-left:1px solid var(--c64bord);
  border-right:1px solid var(--c64bord); cursor:col-resize; flex-shrink:0;
  transition:background .15s; z-index:10;
}
.rz:hover, .rz.on { background:var(--c64bord); }

/* LEFT PANEL — resizable */
#lp { width:200px; min-width:120px; flex-shrink:0; }

#dz {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:8px; cursor:pointer; color:var(--c64txt); font-size:13px; font-weight:700;
  letter-spacing:2px; text-transform:uppercase; position:relative; z-index:2;
}
#dz:hover, #dz.on { background:rgba(112,112,232,.08); }
#dz .di { font-size:32px; opacity:.3; }
#dz .dt { color:var(--c64white); }
#dz .ds { font-size:10px; letter-spacing:1px; }

#tb {
  height:22px; background:var(--c64dark); border-bottom:1px solid var(--c64bord);
  display:none; align-items:center; padding:0 4px; gap:3px; flex-shrink:0; z-index:6;
}
.tbb {
  height:16px; padding:0 6px; background:var(--c64bg); border:1px solid var(--c64bord);
  color:var(--c64txt); font-family:var(--font); font-size:10px; font-weight:700;
  letter-spacing:1px; text-transform:uppercase; cursor:pointer;
}
.tbb:hover { background:var(--c64inv); color:var(--c64invfg); }
.tfl {
  flex:1; height:16px; background:var(--c64dark); border:1px solid var(--c64bord);
  color:var(--c64white); font-family:var(--font); font-size:11px; font-weight:700;
  letter-spacing:1px; text-transform:uppercase; padding:0 4px; outline:none;
}
.tfl::placeholder { color:var(--c64bord); }

#tw { flex:1; overflow-y:auto; overflow-x:hidden; display:none; position:relative; z-index:2; }
#tw::-webkit-scrollbar { width:5px; }
#tw::-webkit-scrollbar-track { background:var(--c64dark); }
#tw::-webkit-scrollbar-thumb { background:var(--c64bord); }

.tn { display:flex; align-items:center; height:18px; padding:0 4px; cursor:pointer; user-select:none; white-space:nowrap; }
.tn:hover { background:rgba(112,112,232,.18); }
.tn.sel { background:var(--c64inv); }
.tn.sel .nn { color:var(--c64invfg); }
.ntog { width:14px; flex-shrink:0; text-align:center; font-size:13px; color:var(--c64txt); }
.nn { font-size:13px; line-height:18px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; flex:1; overflow:hidden; text-overflow:ellipsis; color:var(--c64txt); }
.nn.fld { color:var(--c64white); }
.nn.d64 { color:var(--c64cyan); }
.nn.m3u { color:var(--c64yel); }
.nsz { font-size:10px; color:var(--c64bord); flex-shrink:0; margin-left:4px; }

/* MIDDLE PANEL - emulator — vždy zabírá místo */
#ep { flex:1 1 0; min-width:0; display:flex; }

#prev-body { flex:1; overflow:hidden; position:relative; z-index:2; }
#emu-placeholder {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:14px;
  color:rgba(60,60,175,.4); font-size:11px; letter-spacing:3px; text-transform:uppercase;
  background:var(--c64bg);
}
#emu-frame { position:absolute; inset:0; width:100%!important; height:100%!important; border:none; }
.prev-info { position:absolute; bottom:4px; right:8px; font-size:9px; color:rgba(80,80,180,.4); letter-spacing:1px; text-transform:uppercase; z-index:3; }

/* RIGHT PANEL - directory */
#dp { flex:0 0 420px; min-width:0; transition:flex-basis .3s ease; overflow:hidden; }
body.play-mode #dp { flex-basis:0 !important; }
body.play-mode #rz2 { display:none; }

#c64s {
  flex:1; overflow-y:auto; overflow-x:hidden; padding:14px 20px 18px;
  position:relative; z-index:2; font-size:20px; line-height:24px; font-weight:700;
  letter-spacing:.5px; color:var(--c64txt); text-transform:uppercase; white-space:pre;
}
#c64s::-webkit-scrollbar { width:6px; }
#c64s::-webkit-scrollbar-track { background:var(--c64dark); }
#c64s::-webkit-scrollbar-thumb { background:var(--c64bord); }
#c64e {
  height:100%; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:12px; color:rgba(55,55,175,.4); font-size:11px;
  letter-spacing:3px; pointer-events:none;
}
.c64e-ico { font-size:36px; opacity:.25; }

.dl { display:block; line-height:24px; white-space:pre; cursor:default; }
.dl.entry { cursor:pointer; }
.dl.entry:hover { background:rgba(200,200,255,.1); }
.rv     { background:var(--c64inv); color:var(--c64invfg); }
.d-blk  { color:var(--c64white); display:inline-block; }
.d-fn   { color:var(--c64white); }
.d-id   { color:var(--c64white); }
.t-prg  { color:var(--c64cyan); }
.t-seq  { color:var(--c64green); }
.t-rel  { color:var(--c64yel); }
.t-usr  { color:var(--c64mag); }
.t-dir  { color:var(--c64yel); }
.t-del  { color:rgba(180,180,255,.2); }
.t-cbm  { color:var(--c64mag); }
.t-nc   { color:var(--c64red); }
.t-lk   { color:var(--c64yel); }
.t-yel  { color:var(--c64yel); }
.d-free { color:var(--c64white); }
.cur { display:inline-block; width:10px; height:17px; background:var(--c64txt); vertical-align:text-bottom; animation:blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* BOTTOM BAR */
#bot {
  height:20px; background:var(--c64dark); border-top:1px solid var(--c64bord);
  display:flex; align-items:center; padding:0 10px; gap:14px; flex-shrink:0;
}
.bk { background:var(--c64inv); color:var(--c64invfg); font-size:9px; font-weight:700; padding:0 4px; margin-right:2px; letter-spacing:1px; }
.bl { font-size:9px; color:var(--c64txt); letter-spacing:1px; text-transform:uppercase; }
.bot-btn { height:16px; padding:0 8px; background:var(--c64bg); border:1px solid var(--c64bord); color:var(--c64cyan); font-family:var(--font); font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; }
.bot-btn:hover { background:var(--c64inv); color:var(--c64invfg); }
.bsp { flex:1; }
#st { font-size:9px; color:var(--c64txt); letter-spacing:1px; text-transform:uppercase; }

/* TOAST */
#toast {
  position:fixed; bottom:36px; left:50%; transform:translateX(-50%) translateY(12px);
  background:var(--c64dark); border:1px solid var(--c64white); color:var(--c64white);
  font-family:var(--font); font-size:10px; letter-spacing:2px; text-transform:uppercase;
  padding:6px 16px; border-radius:3px; opacity:0; transition:opacity .2s,transform .2s;
  z-index:999; pointer-events:none;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* MOBILE */
@media (max-width:900px) and (orientation:portrait) {
  html { transform:rotate(90deg); transform-origin:left top; width:100vh; height:100vw; overflow:hidden; position:absolute; top:0; left:100%; transition:none; }
  body { opacity:0; animation:fadeIn .15s ease .05s forwards; }
}
@keyframes fadeIn { to { opacity:1; } }

@media (max-width:900px) {
  .rz { display:none !important; }
  #lp { width:160px !important; min-width:160px !important; max-width:160px !important; flex-shrink:0 !important; flex-grow:0 !important; }
  #ep { flex:1 1 0 !important; }
  #dp { flex:1 1 0 !important; width:auto !important; transition:none; }
  body.play-mode #dp { flex:0 0 0 !important; overflow:hidden; }
  #top { height:22px; }
  #bot { height:18px; }
  .logo { font-size:9px; }
  .bk, .bl, #st { font-size:7px; }
  .nn { font-size:11px; }
}
</style>
</head>
<body>

  <!-- LEFT: file tree -->
  <div class="panel" id="lp">

<script>
'use strict';

// ══ D64 PARSER ══════════════════════════════════════════════════
const TSEC = [0,21,21,21,21,21,21,21,21,21,21,21,21,21,21,21,21,21,
              19,19,19,19,19,19,19,18,18,18,18,18,18,17,17,17,17,17];

function secOff(t,s){let o=0;for(let i=1;i<t;i++)o+=(TSEC[i]||17)*256;return o+s*256;}

function petDisp(b){
  if(b===0x20)return ' ';
  if(b>=0x21&&b<=0x3F)return String.fromCharCode(b);
  if(b===0x40)return '@';
  if(b>=0x41&&b<=0x5A)return String.fromCharCode(b);
  if(b>=0x61&&b<=0x7A)return String.fromCharCode(b-0x20);
  if(b>=0xC1&&b<=0xDA)return String.fromCharCode(b-0x80);
  if(b>=0x01&&b<=0x1F)return String.fromCharCode(b+0x40);
  return ' ';
}
function petVice(b){
  if(b>=0x20&&b<=0x40)return String.fromCharCode(b);
  if(b>=0x41&&b<=0x5A)return String.fromCharCode(b+0x20);
  if(b>=0xC1&&b<=0xDA)return String.fromCharCode(b-0x80);
  if(b>=0x61&&b<=0x7A)return String.fromCharCode(b-0x20);
  if(b>=0x01&&b<=0x1F)return String.fromCharCode(b+0x40);
  return '';
}
function readPet(d,off,len){
  let disp='',vice='';
  for(let i=0;i<len;i++){
    let b=d[off+i];
    if(b===0xA0||b===0x00)break;
    if(b>=0x01&&b<=0x1F)b+=0x40;
    disp+=petDisp(b);vice+=petVice(b);
  }
  return {disp:disp||'?',vice:vice||''};
}

const FTYPES=['DEL','SEQ','PRG','USR','REL','CBM','DIR','???'];

function parseD64(buf){
  const d=new Uint8Array(buf);
  const bam=secOff(18,0);
  const diskName=readPet(d,bam+0x90,16).disp||'UNNAMED';
  const diskId=readPet(d,bam+0xA2,5).disp||'?????';
  let free=0;
  for(let t=1;t<=35;t++){
    if(t===18)continue;
    free+=d[bam+4+(t-1)*4];
  }
  const entries=[];
  let tr=18,sc=1;
  for(let guard=0;guard<20&&tr!==0;guard++){
    const base=secOff(tr,sc);
    for(let slot=0;slot<8;slot++){
      const off=base+slot*32;
      if(d[off+2]===0)continue;
      const ft=d[off+2]&0x07;
      const closed=!!(d[off+2]&0x80);
      const locked=!!(d[off+2]&0x40);
      const fn=readPet(d,off+5,16);
      const blocks=(d[off+0x1E]|(d[off+0x1F]<<8));
      entries.push({filename:fn.disp,fnVice:fn.vice,type:FTYPES[ft],blocks,closed,locked});
    }
    const nt=d[base],ns=d[base+1];
    if(!nt)break;
    tr=nt;sc=ns;
  }
  return {diskName,diskId,free,entries,data:buf};
}

function readFileData(entry){
  if(!curDisk)return null;
  const d=new Uint8Array(curDisk.data);
  const name=entry.fnVice.trim().toUpperCase();
  let tr=18,sc=1;
  for(let i=0;i<144;i++){
    const off=secOff(tr,sc)+i%8*32;
    if(d[off+2]===0)continue;
    const ft=d[off+2]&0x07;
    const fn=readPet(d,off+5,16);
    if(fn.vice.trim().toUpperCase()===name&&FTYPES[ft]==='PRG'){
      let ct=d[off+3],cs=d[off+4];
      const bytes=[];
      for(let guard=0;guard<1000&&ct!==0;guard++){
        const so=secOff(ct,cs);
        const nt=d[so],ns=d[so+1];
        const len=nt===0?ns-1:254;
        for(let j=2;j<2+len;j++)bytes.push(d[so+j]);
        if(nt===0)break;
        ct=nt;cs=ns;
      }
      return new Uint8Array(bytes);
    }
    if((i+1)%8===0){const nb=secOff(tr,sc);const nt=d[nb],ns=d[nb+1];if(!nt)break;tr=nt;sc=ns;}
  }
  return null;
}

// ══ STATE ════════════════════════════════════════════════════════
let curDisk=null,curDiskPath='',entries_ref=[],emuBlobUrl=null,curM3uDisks=null;
let roots=[],expanded=new Set(),selNode=null,flatNodes=[];

// ══ EMULATOR ════════════════════════════════════════════════════
function buildSrcdoc(gameUrl,gameName){
  const js=[
    'window.EJS_player='+JSON.stringify('#game')+';',
    'window.EJS_core='+JSON.stringify('vice_x64sc')+';',
    'window.EJS_gameUrl='+JSON.stringify(gameUrl)+';',
    'window.EJS_gameName='+JSON.stringify(gameName)+';',
    'window.EJS_pathtodata='+JSON.stringify('https://cdn.emulatorjs.org/stable/data/')+';',
    'window.EJS_startOnLoaded=true;',
    'window.EJS_coreSettings={"vice_keyboard_passthrough":"enabled","vice_drive_true_emulation":"enabled"};',
    'window.EJS_language="en-US";',
    'window.EJS_backgroundColor="#000000";',
    'window.EJS_color="#3535c0";',
    'window.EJS_AdUrl="";',
    'window.EJS_Buttons={playPause:false,restart:true,mute:true,settings:true,fullscreen:true,saveState:true,loadState:true,screenRecord:false,gamepad:true,cheat:false,volume:true};',
  ].join('\n');
  const onStart=[
    'window.EJS_onGameStart=function(){',
    '  var tries=0,iv=setInterval(function(){',
    '    if(++tries>60){clearInterval(iv);return;}',
    '    var e=window.EJS_emulator;',
    '    if(!e||!e.settingsLoaded)return;',
    '    clearInterval(iv);',
    '    try{e.changeSettingOption("vice_physical_keyboard_pass_through","enabled");',
    '    e.changeSettingOption("keyboardInput","enabled");',
    '    e.changeSettingOption("vice_joyport","2");',
    '    e.changeSettingOption("vice_drive_true_emulation","enabled");',
    '    }catch(ex){}',
    '  },250);',
    '};',
  ].join('\n');
  return '<!DOCTYPE html><html><head><meta charset="UTF-8">'
    +'<style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;background:#000;overflow:hidden}#game{width:100%;height:100%}</style>'
    +'</head><body><div id="game"></div>'
    +'<script>\n'+js+'\n'+onStart+'\n<\/script>'
    +'<script src="https://cdn.emulatorjs.org/stable/data/loader.js"><\/script>'
    +'</body></html>';
}

function startEmu(gameUrl, gameName, title, sub, info){
  document.getElementById('ep-title').textContent=title;
  document.getElementById('ep-sub').textContent=sub;
  document.getElementById('prev-info').textContent=info;
  document.getElementById('emu-placeholder').style.display='none';
  document.body.classList.add('has-game');
  document.body.classList.add('play-mode');

  const frame=document.getElementById('emu-frame');
  frame.srcdoc='';
  setTimeout(()=>{ frame.srcdoc=buildSrcdoc(gameUrl,gameName); },150);
}

function launchEmulator(entry){
  if(!curDisk){setS('NO DISK');return;}
  if(emuBlobUrl){URL.revokeObjectURL(emuBlobUrl);emuBlobUrl=null;}

  const prg=readFileData(entry);
  if(!prg||!prg.length){setS('EMPTY FILE');return;}

  const blob=new Blob([prg],{type:'application/octet-stream'});
  emuBlobUrl=URL.createObjectURL(blob);
  const gameName=(entry.fnVice||entry.filename).trim()+'.prg';
  startEmu(emuBlobUrl, gameName, entry.filename, entry.type+' · '+entry.blocks+' BLK', 'PRG·'+entry.blocks+'BLK');
}

function mountDisk(){
  if(!curDisk){setS('NO DISK LOADED');return;}
  if(emuBlobUrl){URL.revokeObjectURL(emuBlobUrl);emuBlobUrl=null;}

  if(curM3uDisks&&curM3uDisks.length>1){
    // M3U mode — načti všechny D64 a sestav zip-like blob
    // VICE přijímá M3U jako textový soubor se seznamem D64
    // Musíme použít VFS — předáme první D64 a M3U jako samostatné soubory
    // EmulatorJS podporuje EJS_gameUrl jako M3U pokud gameName končí .m3u
    const reads=curM3uDisks.map(f=>new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=e=>res({name:f.name,data:new Uint8Array(e.target.result)});
      r.onerror=rej;
      r.readAsArrayBuffer(f);
    }));
    Promise.all(reads).then(disks=>{
      const m3uText=disks.map(d=>d.name).join('\n');
      const m3uBlob=new Blob([m3uText],{type:'text/plain'});
      // EmulatorJS nepodporuje M3U přímo — použijeme první disk a informujeme uživatele
      const blob=new Blob([disks[0].data],{type:'application/octet-stream'});
      emuBlobUrl=URL.createObjectURL(blob);
      const name=curDisk.diskName.trim()||'DISK';
      startEmu(emuBlobUrl,'disk.d64',name,'D64 MOUNTED ('+disks.length+' DISKS)','D64·M3U');
      setS('MOUNTED '+disks.length+' DISK PLAYLIST — USE DISC CONTROL TO SWAP');
    });
  } else {
    const blob=new Blob([curDisk.data],{type:'application/octet-stream'});
    emuBlobUrl=URL.createObjectURL(blob);
    const name=curDisk.diskName.trim()||'DISK';
    startEmu(emuBlobUrl,'disk.d64',name,'D64 MOUNTED','D64');
  }
}

// ══ DIRECTORY RENDERER ══════════════════════════════════════════
function E(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function tc(t){return{PRG:'t-prg',SEQ:'t-seq',REL:'t-rel',USR:'t-usr',DIR:'t-dir',DEL:'t-del',CBM:'t-cbm','???':'t-del'}[t]||'t-del';}

function renderDir(info,name){
  entries_ref=info.entries;
  const lines=[];
  const dn=info.diskName.padEnd(16,' ');

  // MOUNT řádky — úplně první
  lines.push('<div class="dl entry mount-entry"><span class="d-blk">    ▶ </span><span class="d-fn">&quot;MOUNT &amp; LOAD      &quot; </span><span class="t-prg">D64</span></div>');

  // Prázdný řádek
  lines.push('<div class="dl"> </div>');

  // Hlavička diskety
  lines.push('<div class="dl"><span class="d-blk">  0 </span><span class="d-id">0 &quot;</span><span class="rv">'+E(info.diskName.padEnd(15,' '))+'</span><span class="d-id"> &quot;'+E(info.diskId)+'</span></div>');

  // Soubory
  info.entries.forEach((e,i)=>{
    const blk=String(e.blocks).padStart(5,' ');
    const fn=e.filename.padEnd(16,' ');
    const splat=e.closed?'':'<span class="t-nc">*</span>';
    const lock=e.locked?'<span class="t-lk">&lt;</span>':'';
    lines.push('<div class="dl entry" data-i="'+i+'"><span class="d-blk">'+blk+' </span><span class="d-fn">&quot;'+E(fn)+'&quot; </span>'+splat+'<span class="'+tc(e.type)+'">'+E(e.type)+'</span>'+lock+'</div>');
  });

  lines.push('<div class="dl"><span class="d-blk">'+String(info.free).padStart(5,' ')+' </span><span class="d-free">BLOCKS FREE.</span><span class="cur"></span></div>');

  const scr=document.getElementById('c64s');
  scr.innerHTML=lines.join('');
  scr.scrollTop=0;

  scr.querySelector('.mount-entry').addEventListener('click',mountDisk);
  scr.querySelectorAll('.dl.entry:not(.mount-entry):not(.mountonly-entry)').forEach(el=>{
    el.addEventListener('click',()=>launchEmulator(info.entries[+el.dataset.i]));
  });

  document.getElementById('dp-title').textContent='*** '+info.diskName.trim()+' ***';
  document.getElementById('dp-sub').textContent=info.entries.length+' FILES';
  document.getElementById('fc').textContent=info.entries.length;
  document.getElementById('fp').textContent=info.entries.filter(e=>e.type==='PRG').length;
  document.getElementById('ff').textContent=info.free;
  document.getElementById('fid').textContent=info.diskId.trim()||'??';
  document.getElementById('dpfoot').style.display='flex';
  setS(name+' — '+info.entries.length+' FILES, '+info.free+' FREE');
}

// ══ LOAD D64 ════════════════════════════════════════════════════
function loadD64(file,name){
  setS('LOADING '+name+'...');
  curDiskPath=file.webkitRelativePath||file.name;
  curM3uDisks=null;
  const r=new FileReader();
  r.onload=ev=>{
    try{const info=parseD64(ev.target.result);curDisk=info;renderDir(info,name);}
    catch(err){setS('ERROR: '+err.message);}
  };
  r.readAsArrayBuffer(file);
}

// ══ LOAD M3U ════════════════════════════════════════════════════
function loadM3U(file, name){
  setS('LOADING M3U: '+name+'...');
  const r=new FileReader();
  r.onload=ev=>{
    const text=ev.target.result;
    const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));
    if(!lines.length){setS('EMPTY M3U');return;}

    // Najdi D64 soubory podle názvu z M3U v načtených souborech
    const dir=file.webkitRelativePath?file.webkitRelativePath.split('/').slice(0,-1).join('/'):'';
    const allFiles={};
    // Sbírej všechny soubory ze stromu
    function collectFiles(nodes){nodes.forEach(n=>{if(n.file)allFiles[n.name.toLowerCase()]=n.file;collectFiles(n.children);});}
    collectFiles(roots);

    const diskFiles=lines.map(l=>{
      const basename=l.split('/').pop().split('\\').pop();
      return allFiles[basename.toLowerCase()]||null;
    }).filter(Boolean);

    if(!diskFiles.length){setS('NO D64 FILES FOUND FOR M3U');return;}

    curM3uDisks=diskFiles;

    // Načti první D64 pro zobrazení adresáře
    loadD64(diskFiles[0], lines[0].split('/').pop().split('\\').pop());
    setS('M3U: '+diskFiles.length+' DISKS — '+name);
  };
  r.readAsText(file);
}

// ══ FILE TREE ════════════════════════════════════════════════════
function decodePath(p){try{return decodeURIComponent(p.replace(/\+/g,' '));}catch(e){return p;}}

function buildTree(files){
  const rootMap={};
  Array.from(files).forEach(f=>{
    const raw=f.webkitRelativePath||f.name;
    const parts=decodePath(raw).split('/');
    let cur=rootMap;
    parts.forEach((part,i)=>{
      if(!cur[part])cur[part]={name:part,children:{},file:null,path:parts.slice(0,i+1).join('/')};
      if(i===parts.length-1)cur[part].file=f;
      cur=cur[part].children;
    });
  });
  function toArr(map,depth){
    return Object.values(map).map(n=>{
      const ch=toArr(n.children,depth+1);
      const isD64=n.name.toLowerCase().endsWith('.d64');
      const isM3u=n.name.toLowerCase().endsWith('.m3u');
      return{name:n.name,path:n.path,depth,isD64,isM3u,file:n.file,children:ch};
    }).sort((a,b)=>{
      if(a.isD64!==b.isD64)return a.isD64?1:-1;
      return a.name.localeCompare(b.name,undefined,{numeric:true});
    });
  }
  return toArr(rootMap,0);
}

function flattenTree(nodes,res=[]){
  nodes.forEach(n=>{res.push(n);if(expanded.has(n.path)&&n.children.length)flattenTree(n.children,res);});
  return res;
}

function renderTree(){
  const filter=document.getElementById('tflt').value.toUpperCase();
  flatNodes=flattenTree(roots);
  if(filter)flatNodes=flatNodes.filter(n=>n.name.toUpperCase().includes(filter));
  const frag=document.createDocumentFragment();
  flatNodes.forEach((n,i)=>{
    const row=document.createElement('div');
    row.className='tn'+(selNode===n?' sel':'');
    const hasKids=n.children&&n.children.length;
    const tog=document.createElement('span');
    tog.className='ntog';
    tog.style.marginLeft=(n.depth*12)+'px';
    tog.textContent=hasKids?(expanded.has(n.path)?'▾':'▸'):'';
    const nm=document.createElement('span');
    nm.className='nn '+(n.isD64?'d64':n.isM3u?'m3u':hasKids?'fld':'fil');
    nm.textContent=n.name;
    row.appendChild(tog);row.appendChild(nm);
    row.addEventListener('click',()=>{
      if(hasKids){expanded.has(n.path)?expanded.delete(n.path):expanded.add(n.path);renderTree();}
      if(n.isD64&&n.file){selNode=n;renderTree();loadD64(n.file,n.name);}
      if(n.isM3u&&n.file){selNode=n;renderTree();loadM3U(n.file,n.name);}
    });
    frag.appendChild(row);
  });
  const tree=document.getElementById('tree');
  tree.innerHTML='';tree.appendChild(frag);
}

function loadFolder(fileList){
  roots=buildTree(fileList);
  expanded=new Set();
  if(roots.length)expanded.add(roots[0].path);
  selNode=null;

  // Na mobilu zobraz jen D64 soubory v ploché struktuře — bez hluboké cesty
  const mobile=/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)||window.innerWidth<=900;
  if(mobile){
    const allD64=[];
    function collectD64(nodes){nodes.forEach(n=>{if((n.isD64||n.isM3u)&&n.file)allD64.push(n);collectD64(n.children);});}
    collectD64(roots);
    roots=allD64.map(n=>({...n,depth:0,children:[]}));
    expanded=new Set();
  }

  document.getElementById('dz').style.display='none';
  document.getElementById('tb').style.display='flex';
  document.getElementById('tw').style.display='block';
  document.getElementById('lpfoot').style.display='flex';
  let d64=0,dirs=0;
  const count=ns=>ns.forEach(n=>{if(n.isD64)d64++;else if(n.children.length)dirs++;count(n.children);});
  count(roots);
  document.getElementById('pf').textContent=dirs;
  document.getElementById('pd').textContent=d64;
  document.getElementById('pcpath').textContent=roots[0]?.name||'';
  document.getElementById('lp-sub').textContent=d64+' D64';
  renderTree();
  setS('LOADED: '+d64+' D64 FILES');
}

// ══ RESIZERS ════════════════════════════════════════════════════
function makeResizer(rzId,el,invert){
  const rz=document.getElementById(rzId);
  if(!rz)return;
  let down=false,x0=0,w0=0;
  rz.addEventListener('mousedown',e=>{
    down=true;x0=e.clientX;w0=el.offsetWidth;
    rz.classList.add('on');document.body.style.cssText='cursor:col-resize;user-select:none';
  });
  document.addEventListener('mousemove',e=>{
    if(!down)return;
    const delta=invert?(x0-e.clientX):(e.clientX-x0);
    const w=Math.max(160,Math.min(window.innerWidth-400,w0+delta));
    el.style.flexBasis=w+'px';
  });
  document.addEventListener('mouseup',()=>{
    if(!down)return;down=false;rz.classList.remove('on');document.body.style.cssText='';
  });
}
makeResizer('rz1',document.getElementById('lp'),false);
makeResizer('rz2',document.getElementById('dp'),true);

  document.getElementById('clk').textContent=[n.getHours(),n.getMinutes(),n.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');
}
